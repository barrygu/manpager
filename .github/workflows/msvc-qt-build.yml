name: Build with MSVC + Qt

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.4.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: 'true'
    
    - name: Setup MSVC
      uses: microsoft/setup-msbuild@v1.1
    
    - name: Generate build files with qmake
      run: |
        mkdir build
        cd build
        qmake ../Manpager.pro -spec win32-msvc CONFIG+=release
      shell: cmd
    
    - name: Build with MSVC
      run: |
        cd build
        nmake
      shell: cmd
    
    - name: Upload release artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: manpager-windows-release
        path: build/Release/
        retention-days: 30
