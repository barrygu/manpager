name: Build with MSVC + Qt

on:
  workflow_dispatch:
    inputs:
      qt_version:
        description: 'Qt Version to use'
        required: true
        default: '6.4.0'
        type: string
      build_config:
        description: 'Build Configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: ${{ inputs.qt_version || '6.4.0' }}
        host: 'windows'
        target: 'desktop'
        arch: 'win64_msvc2019_64'
        cache: 'true'
    
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Generate build files with qmake
      run: |
        mkdir build
        cd build
        qmake ../Manpager.pro -spec win32-msvc CONFIG+=release
    
    - name: Build with nmake
      run: |
        cd build
        nmake
    
    - name: List build output
      run: |
        echo "=== Contents of build directory ==="
        dir /s build
    
    - name: Deploy Qt libraries
      run: |
        if exist build\Manpager.exe (
          cd build
          windeployqt Manpager.exe
        ) else (
          echo "Manpager.exe not found in build directory"
          dir build
        )
      shell: cmd
    
    - name: Upload release artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: manpager-windows-release
        path: build/
        retention-days: 30
